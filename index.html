<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polyhedron — 16-Face Coherence Sphere</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #e8dcc8;
            overflow: hidden;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        #ui-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 10;
            pointer-events: none;
        }
        #ui-layer > * { pointer-events: auto; }

        .title-bar {
            position: absolute;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            text-align: center;
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #c8a04e;
            border-radius: 8px;
            padding: 12px 28px;
            backdrop-filter: blur(8px);
        }
        .title-bar h1 {
            color: #c8a04e;
            font-size: 1.4rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .title-bar .subtitle {
            color: #8a7a5a;
            font-size: 0.75rem;
            letter-spacing: 2px;
        }

        .face-panel {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            max-height: 70vh;
            overflow-y: auto;
            background: rgba(10, 10, 15, 0.9);
            border: 1px solid #c8a04e44;
            border-radius: 10px;
            padding: 16px;
            backdrop-filter: blur(12px);
        }
        .face-panel h2 {
            color: #c8a04e;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-align: center;
            border-bottom: 1px solid #c8a04e33;
            padding-bottom: 8px;
        }
        .face-item {
            display: flex;
            align-items: center;
            padding: 8px 10px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }
        .face-item:hover {
            background: rgba(200, 160, 78, 0.1);
            border-color: #c8a04e44;
        }
        .face-item.active {
            background: rgba(200, 160, 78, 0.2);
            border-color: #c8a04e;
        }
        .face-number {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: #c8a04e22;
            border: 1px solid #c8a04e;
            color: #c8a04e;
            font-size: 0.75rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            flex-shrink: 0;
        }
        .face-label {
            font-size: 0.8rem;
            color: #c8c0a8;
            letter-spacing: 0.5px;
        }
        .face-item:hover .face-label { color: #e8dcc8; }
        .face-item.active .face-label { color: #c8a04e; }

        .info-panel {
            position: absolute;
            bottom: 20px; left: 20px;
            background: rgba(10, 10, 15, 0.85);
            border: 1px solid #c8a04e44;
            border-radius: 8px;
            padding: 14px 18px;
            backdrop-filter: blur(8px);
            max-width: 320px;
        }
        .info-panel .selected-face {
            color: #c8a04e;
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .info-panel .face-url {
            color: #6a9eff;
            font-size: 0.75rem;
            word-break: break-all;
            margin-bottom: 8px;
        }
        .info-panel .face-type {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: #c8a04e22;
            border: 1px solid #c8a04e55;
            color: #c8a04e;
        }
        .info-panel .navigate-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #c8a04e;
            color: #0a0a0f;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s;
        }
        .navigate-btn:hover {
            background: #d8b05e;
            box-shadow: 0 0 12px rgba(200, 160, 78, 0.4);
        }

        .controls-hint {
            position: absolute;
            bottom: 20px; right: 20px;
            background: rgba(10, 10, 15, 0.7);
            border: 1px solid #c8a04e22;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.7rem;
            color: #8a7a5a;
            line-height: 1.6;
        }

        /* Scrollbar styling */
        .face-panel::-webkit-scrollbar { width: 4px; }
        .face-panel::-webkit-scrollbar-track { background: transparent; }
        .face-panel::-webkit-scrollbar-thumb { background: #c8a04e44; border-radius: 2px; }
    </style>
<base target="_blank">
<base target="_blank">
</head>
<body>

<div id="canvas-container"></div>

<div id="ui-layer">
    <div class="title-bar">
        <h1>Coherence Sphere</h1>
        <div class="subtitle">16-Face Polyhedron Navigation</div>
    </div>

    <div class="face-panel" id="facePanel">
        <h2>Faces</h2>
        <div id="faceList"></div>
    </div>

    <div class="info-panel" id="infoPanel">
        <div class="selected-face" id="selectedFace">Select a face</div>
        <div class="face-url" id="faceUrl">—</div>
        <div class="face-type" id="faceType">—</div>
        <button class="navigate-btn" id="navigateBtn" style="display:none;">Navigate</button>
    </div>

    <div class="controls-hint">
        Left Click · Select Face<br>
        Right Click · Pan<br>
        Scroll · Zoom<br>
        Drag · Rotate
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// 16-FACE POLYHEDRON 3D NAVIGATION
// Three.js Coherence Sphere
// Sidebar: 16 sequential faces (1-16)
// 3D Geometry: unchanged icosahedron with 16 markers
// Faces 9, 11, 15, 16 removed per standing instruction
// Face 20 (M COHERENCE) added as #16
// ═══════════════════════════════════════════════════════════════

const POLYHEDRON_FACES = [
  { seq: 1,  label: "RESONANT HARMONY",    url: "RESONANT HARMONY.html",                  type: "internal" },
  { seq: 2,  label: "ILLUSIONS",           url: "illusions.html",                         type: "internal" },
  { seq: 3,  label: "KARDASHEV COMPLETE",  url: "kardashev-complete.html",                type: "internal" },
  { seq: 4,  label: "SPACE FOR LEASE",     url: "leased_space_doctrine_standalone.html",  type: "internal" },
  { seq: 5,  label: "MILESTONE",           url: "mesh-codex-milestone.html",              type: "internal" },
  { seq: 6,  label: "MESH",                url: "mesh.html",                              type: "internal" },
  { seq: 7,  label: "OLINTO DE PRETTO",    url: "olinto_de_pretto.html",                  type: "internal" },
  { seq: 8,  label: "-Ω∞ ANALYSIS",        url: "omega-empirical-analysis.html",          type: "internal" },
  { seq: 9,  label: "-Ω∞ STARS",           url: "star-identification.html",               type: "internal" },
  { seq: 10, label: "LIVE SATELLITES",     url: "satellite.html",                         type: "internal" },
  { seq: 11, label: "ENERGY",              url: "tetrahedral-spiral-madl.html",           type: "internal" },
  { seq: 12, label: "FEDERATION",          url: "federation-root-unified.html",           type: "internal" },
  { seq: 13, label: "COHERENCE",           url: "coherence-frequency-ontology.html",      type: "internal" },
  { seq: 14, label: "NOAA GATEWAY",        url: "https://noaa.macachor.org/",             type: "external" },
  { seq: 15, label: "THE SINGULARITY",     url: "Ω-PRIME.html",                           type: "singularity" },
  { seq: 16, label: "M COHERENCE",         url: "m-invariant-hardware-specification.html", type: "attachment" }
];

// ── THREE.JS SETUP ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enablePan = true;
controls.minDistance = 3;
controls.maxDistance = 15;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.3;

// ── LIGHTING ──
const ambientLight = new THREE.AmbientLight(0x404040, 0.5);
scene.add(ambientLight);

const mainLight = new THREE.DirectionalLight(0xc8a04e, 1.2);
mainLight.position.set(5, 5, 5);
mainLight.castShadow = true;
scene.add(mainLight);

const rimLight = new THREE.DirectionalLight(0x4a9eff, 0.6);
rimLight.position.set(-5, -3, -5);
scene.add(rimLight);

const pointLight = new THREE.PointLight(0xc8a04e, 0.8, 20);
pointLight.position.set(0, 0, 0);
scene.add(pointLight);

// ── STARFIELD BACKGROUND ──
const starGeometry = new THREE.BufferGeometry();
const starCount = 3000;
const starPositions = new Float32Array(starCount * 3);
for (let i = 0; i < starCount * 3; i++) {
    starPositions[i] = (Math.random() - 0.5) * 100;
}
starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
const starMaterial = new THREE.PointsMaterial({
    color: 0xc8c0a8,
    size: 0.03,
    transparent: true,
    opacity: 0.7
});
const stars = new THREE.Points(starGeometry, starMaterial);
scene.add(stars);

// ── POLYHEDRON CONSTRUCTION (UNCHANGED GEOMETRY) ──
const polyhedronGeometry = new THREE.IcosahedronGeometry(2, 1);
const polyhedronMaterial = new THREE.MeshPhysicalMaterial({
    color: 0x1a1a2e,
    metalness: 0.7,
    roughness: 0.3,
    clearcoat: 0.5,
    clearcoatRoughness: 0.2,
    emissive: 0x0a0a1a,
    emissiveIntensity: 0.2,
    side: THREE.DoubleSide
});
const polyhedron = new THREE.Mesh(polyhedronGeometry, polyhedronMaterial);
polyhedron.castShadow = true;
polyhedron.receiveShadow = true;
scene.add(polyhedron);

// Wireframe overlay
const wireframeGeo = new THREE.WireframeGeometry(polyhedronGeometry);
const wireframeMat = new THREE.LineBasicMaterial({
    color: 0xc8a04e,
    transparent: true,
    opacity: 0.25
});
const wireframe = new THREE.LineSegments(wireframeGeo, wireframeMat);
polyhedron.add(wireframe);

// ── FACE MARKERS (16 sequential) ──
const faceMeshes = [];

function getFacePosition(index, total) {
    const phi = Math.acos(1 - 2 * (index + 0.5) / total);
    const theta = Math.PI * (1 + Math.sqrt(5)) * (index + 0.5);
    const r = 2.15;
    return new THREE.Vector3(
        r * Math.sin(phi) * Math.cos(theta),
        r * Math.sin(phi) * Math.sin(theta),
        r * Math.cos(phi)
    );
}

POLYHEDRON_FACES.forEach((face, index) => {
    const pos = getFacePosition(index, POLYHEDRON_FACES.length);

    // Marker sphere
    const markerGeo = new THREE.SphereGeometry(0.08, 16, 16);
    const markerMat = new THREE.MeshPhysicalMaterial({
        color: 0xc8a04e,
        metalness: 0.9,
        roughness: 0.1,
        emissive: 0xc8a04e,
        emissiveIntensity: 0.3
    });
    const marker = new THREE.Mesh(markerGeo, markerMat);
    marker.position.copy(pos);
    marker.userData = { seq: face.seq, faceData: face };
    scene.add(marker);
    faceMeshes.push(marker);

    // Glow ring
    const ringGeo = new THREE.RingGeometry(0.12, 0.15, 32);
    const ringMat = new THREE.MeshBasicMaterial({
        color: 0xc8a04e,
        transparent: true,
        opacity: 0.3,
        side: THREE.DoubleSide
    });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.copy(pos);
    ring.lookAt(0, 0, 0);
    scene.add(ring);

    // Number label (3D sprite) — shows sequential 1-16
    const canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, 64, 64);
    ctx.strokeStyle = '#c8a04e';
    ctx.lineWidth = 2;
    ctx.strokeRect(2, 2, 60, 60);
    ctx.fillStyle = '#c8a04e';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(face.seq.toString(), 32, 32);

    const spriteMap = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: spriteMap });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.scale.set(0.3, 0.3, 0.3);
    sprite.position.copy(pos).multiplyScalar(1.08);
    scene.add(sprite);
});

// ── CONNECTION LINES ──
const lineMaterial = new THREE.LineBasicMaterial({
    color: 0xc8a04e,
    transparent: true,
    opacity: 0.15
});

for (let i = 0; i < faceMeshes.length; i++) {
    for (let j = i + 1; j < faceMeshes.length; j++) {
        const dist = faceMeshes[i].position.distanceTo(faceMeshes[j].position);
        if (dist < 2.0) {
            const lineGeo = new THREE.BufferGeometry().setFromPoints([
                faceMeshes[i].position,
                faceMeshes[j].position
            ]);
            const line = new THREE.Line(lineGeo, lineMaterial);
            scene.add(line);
        }
    }
}

// ── RAYCASTER FOR INTERACTION ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredFace = null;
let selectedFace = null;

// ── UI POPULATION (16 sequential) ──
const faceList = document.getElementById('faceList');
POLYHEDRON_FACES.forEach(face => {
    const item = document.createElement('div');
    item.className = 'face-item';
    item.dataset.seq = face.seq;
    item.innerHTML = `
        <div class="face-number">${face.seq}</div>
        <div class="face-label">${face.label}</div>
    `;
    item.addEventListener('click', () => selectFace(face.seq));
    faceList.appendChild(item);
});

function selectFace(seq) {
    const face = POLYHEDRON_FACES.find(f => f.seq === seq);
    if (!face) return;

    selectedFace = face;

    document.querySelectorAll('.face-item').forEach(item => {
        item.classList.toggle('active', parseInt(item.dataset.seq) === seq);
    });

    document.getElementById('selectedFace').textContent = face.label;
    document.getElementById('faceUrl').textContent = face.url;
    document.getElementById('faceType').textContent = face.type;
    document.getElementById('navigateBtn').style.display = 'inline-block';
    document.getElementById('navigateBtn').onclick = () => {
        window.open(face.url, '_blank');
    };

    faceMeshes.forEach(mesh => {
        if (mesh.userData.seq === seq) {
            mesh.material.emissiveIntensity = 1.0;
            mesh.scale.set(1.5, 1.5, 1.5);
        } else {
            mesh.material.emissiveIntensity = 0.3;
            mesh.scale.set(1, 1, 1);
        }
    });
}

// ── MOUSE EVENTS ──
function onMouseMove(event) {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(faceMeshes);

    if (intersects.length > 0) {
        const seq = intersects[0].object.userData.seq;
        if (hoveredFace !== seq) {
            hoveredFace = seq;
            document.body.style.cursor = 'pointer';
            document.querySelectorAll('.face-item').forEach(item => {
                item.style.background = parseInt(item.dataset.seq) === seq
                    ? 'rgba(200, 160, 78, 0.15)' : '';
            });
        }
    } else {
        if (hoveredFace !== null) {
            hoveredFace = null;
            document.body.style.cursor = 'default';
            document.querySelectorAll('.face-item').forEach(item => {
                item.style.background = '';
            });
        }
    }
}

function onClick(event) {
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(faceMeshes);

    if (intersects.length > 0) {
        const seq = intersects[0].object.userData.seq;
        selectFace(seq);
    }
}

window.addEventListener('mousemove', onMouseMove);
window.addEventListener('click', onClick);

// ── RESIZE HANDLER ──
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── ANIMATION LOOP ──
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const time = clock.getElapsedTime();

    const pulse = 1 + Math.sin(time * 0.5) * 0.02;
    polyhedron.scale.set(pulse, pulse, pulse);
    wireframe.scale.set(pulse, pulse, pulse);

    stars.rotation.y = time * 0.02;

    if (selectedFace) {
        const marker = faceMeshes.find(m => m.userData.seq === selectedFace.seq);
        if (marker) {
            const markerPulse = 1.3 + Math.sin(time * 3) * 0.2;
            marker.scale.set(markerPulse, markerPulse, markerPulse);
        }
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();

// ── INITIAL SELECTION ──
selectFace(15); // THE SINGULARITY
</script>

</body>
</html>
